<!DOCTYPE html>
<html>
<head>
  <title>Vella</title>
</head>

<body style="margin:0; font-family:Arial; background:#080a10; color:#e8e8f0; padding-bottom:90px;">

  <!-- TOP BAR -->
  <div style="padding:20px; display:flex; justify-content:space-between; align-items:center;">
    <h2 style="margin:0;">Vella ✨</h2>
    <button style="background:#141823; border:1px solid #2a3145; color:white; padding:10px 16px; border-radius:20px; box-shadow:0 0 12px rgba(255,80,180,0.3);">
      Go Live
    </button>
  </div>

  <!-- REEL CARDS -->
  <div style="padding:15px; display:flex; gap:12px; overflow-x:auto;">

    <div style="min-width:140px; height:200px; background:#111523; border-radius:20px; display:flex; align-items:flex-end; padding:10px; box-shadow:0 0 20px rgba(255,90,200,0.2);">
      <p>🔥 Trending</p>
    </div>

    <div style="min-width:140px; height:200px; background:#111523; border-radius:20px; display:flex; align-items:flex-end; padding:10px; box-shadow:0 0 20px rgba(100,200,255,0.2);">
      <p>💄 Beauty</p>
    </div>

    <div style="min-width:140px; height:200px; background:#111523; border-radius:20px; display:flex; align-items:flex-end; padding:10px; box-shadow:0 0 20px rgba(140,100,255,0.2);">
      <p>💪 Fitness</p>
    </div>

  </div>

  <!-- MAIN CARD -->
  <div style="padding:18px;">
    <div style="background:#10131d; border-radius:28px; padding:22px; box-shadow:0 0 30px rgba(140,100,255,0.2);">
      <h2>Watch. Save. Shop.</h2>
      <p style="color:#a6a6b3;">Scroll content, save into folders, join lives and shop easily.</p>
    </div>
  </div>

  <!-- ICON GRID -->
  <div style="padding:18px; display:grid; grid-template-columns:1fr 1fr; gap:14px;">

    <div style="background:#10131d; border-radius:24px; padding:20px; text-align:center; box-shadow:0 0 18px rgba(255,90,200,0.2);">
      <div style="font-size:26px;">📁</div>
      <p>Save</p>
    </div>

    <div style="background:#10131d; border-radius:24px; padding:20px; text-align:center; box-shadow:0 0 18px rgba(100,200,255,0.2);">
      <div style="font-size:26px;">🔴</div>
      <p>Live</p>
    </div>

    <div style="background:#10131d; border-radius:24px; padding:20px; text-align:center; box-shadow:0 0 18px rgba(140,100,255,0.2);">
      <div style="font-size:26px;">🛍</div>
      <p>Shop</p>
    </div>

    <div style="background:#10131d; border-radius:24px; padding:20px; text-align:center; box-shadow:0 0 18px rgba(0,255,180,0.2);">
      <div style="font-size:26px;">🤝</div>
      <p>Deals</p>
    </div>

  </div>

  <!-- BOTTOM NAV -->
  <div style="position:fixed; bottom:0; width:100%; background:#0d1018; border-top:1px solid #1c2230; display:flex; justify-content:space-around; padding:14px 0; font-size:13px; color:#a0a6b2;">
    <span>🏠</span>
    <span>🔴</span>
    <span>📁</span>
    <span>🛍</span>
    <span>👤</span>
  </div>

</body>
</html>
