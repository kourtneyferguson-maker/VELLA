<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hello Vella</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>

<body class="bg-black text-white">
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    const posts = [
      {
        id: 1,
        type: "Fashion",
        title: "Winter Soft Girl Outfit",
        creator: "Mila Styles",
        image: "🧥",
        description: "A full cosy outfit package with matching winter accessories.",
        items: [
          { name: "Cream coat", price: 89 },
          { name: "Beige scarf", price: 25 },
          { name: "Gloves", price: 18 },
          { name: "Beanie", price: 22 },
          { name: "Brown boots", price: 120 }
        ]
      },
      {
        id: 2,
        type: "Food",
        title: "Garlic Butter Pasta Night",
        creator: "Dinner Babe",
        image: "🍝",
        description: "Save the full recipe, ingredients, and meal cost.",
        items: [
          { name: "Pasta", price: 2.5 },
          { name: "Garlic", price: 1.2 },
          { name: "Butter", price: 3 },
          { name: "Parmesan", price: 4.5 },
          { name: "Parsley", price: 2 }
        ]
      },
      {
        id: 3,
        type: "Workout",
        title: "Leg Day Routine",
        creator: "Fit With Ava",
        image: "🏋️",
        description: "Workout routine with outfit and equipment suggestions.",
        items: [
          { name: "Resistance band", price: 12 },
          { name: "Gym mat", price: 24 },
          { name: "Leggings", price: 49 },
          { name: "Sports bra", price: 35 },
          { name: "Training shoes", price: 110 }
        ]
      },
      {
        id: 4,
        type: "Cleaning",
        title: "Bathroom Deep Clean Kit",
        creator: "Clean Queen",
        image: "🧽",
        description: "Everything used in the cleaning hack, priced and saveable.",
        items: [
          { name: "Spray cleaner", price: 6 },
          { name: "Scrub brush", price: 5 },
          { name: "Microfiber cloths", price: 8 },
          { name: "Toilet gel", price: 4 },
          { name: "Glass cleaner", price: 5 }
        ]
      }
    ];

    function App() {
      const [tab, setTab] = useState("All");
      const [page, setPage] = useState("Feed");
      const [vault, setVault] = useState([]);
      const [shoppingList, setShoppingList] = useState([]);
      const [reminders, setReminders] = useState([]);

      const tabs = ["All", "Fashion", "Food", "Workout", "Cleaning"];

      const filteredPosts =
        tab === "All" ? posts : posts.filter(post => post.type === tab);

      const saveToVault = (post) => {
        if (!vault.find(item => item.id === post.id)) {
          setVault([...vault, post]);
        }
      };

      const addToShoppingList = (post) => {
        const newItems = post.items.map(item => ({
          ...item,
          source: post.title
        }));
        setShoppingList([...shoppingList, ...newItems]);
      };

      const addReminder = (post) => {
        setReminders([
          ...reminders,
          {
            title: post.title,
            text: `Reminder saved for ${post.type}: ${post.title}`
          }
        ]);
      };

      const total = (items) =>
        items.reduce((sum, item) => sum + item.price, 0).toFixed(2);

      return (
        <div className="min-h-screen bg-gradient-to-b from-black via-[#160022] to-black flex justify-center">
          <div className="w-full max-w-md min-h-screen border-x border-purple-900/40 relative pb-24">

            <header className="sticky top-0 z-20 bg-black/70 backdrop-blur-xl border-b border-purple-800/40 p-4">
              <h1 className="text-3xl font-black text-center text-purple-200 drop-shadow-[0_0_14px_#d946ef]">
                Hello Vella
              </h1>
              <p className="text-center text-xs text-purple-300 mt-1">
                Watch it. Save it. Buy it. Plan it.
              </p>
            </header>

            {page === "Feed" && (
              <>
                <div className="flex gap-2 overflow-x-auto p-3">
                  {tabs.map(item => (
                    <button
                      key={item}
                      onClick={() => setTab(item)}
                      className={`px-4 py-2 rounded-full text-sm whitespace-nowrap ${
                        tab === item
                          ? "bg-fuchsia-500 text-white shadow-[0_0_18px_#d946ef]"
                          : "bg-white/10 text-purple-200"
                      }`}
                    >
                      {item}
                    </button>
                  ))}
                </div>

                <main className="p-4 space-y-5">
                  {filteredPosts.map(post => (
                    <section
                      key={post.id}
                      className="rounded-3xl bg-white/10 border border-purple-500/30 p-4 shadow-xl"
                    >
                      <div className="text-6xl text-center py-6 bg-black/40 rounded-3xl">
                        {post.image}
                      </div>

                      <div className="mt-4">
                        <div className="flex justify-between items-start gap-3">
                          <div>
                            <p className="text-xs text-fuchsia-300">{post.type}</p>
                            <h2 className="text-xl font-bold">{post.title}</h2>
                            <p className="text-sm text-purple-200">by {post.creator}</p>
                          </div>
                          <div className="text-right">
                            <p className="text-xs text-purple-300">Package total</p>
                            <p className="text-lg font-black text-green-300">
                              ${total(post.items)}
                            </p>
                          </div>
                        </div>

                        <p className="text-sm text-purple-100 mt-3">
                          {post.description}
                        </p>

                        <div className="mt-4 bg-black/40 rounded-2xl p-3">
                          <p className="font-bold mb-2 text-sm">Included items</p>
                          {post.items.map((item, index) => (
                            <div
                              key={index}
                              className="flex justify-between text-sm border-b border-white/10 py-2"
                            >
                              <span>{item.name}</span>
                              <span>${item.price.toFixed(2)}</span>
                            </div>
                          ))}
                        </div>

                        <div className="grid grid-cols-2 gap-2 mt-4">
                          <button onClick={() => saveToVault(post)} className="bg-fuchsia-600 rounded-2xl p-3 font-bold">
                            Save to Vault
                          </button>
                          <button onClick={() => addToShoppingList(post)} className="bg-purple-700 rounded-2xl p-3 font-bold">
                            Shopping List
                          </button>
                          <button onClick={() => addReminder(post)} className="bg-white/10 rounded-2xl p-3 font-bold">
                            Remind Me
                          </button>
                          <button className="bg-white/10 rounded-2xl p-3 font-bold">
                            Share
                          </button>
                        </div>
                      </div>
                    </section>
                  ))}
                </main>
              </>
            )}

            {page === "Vault" && (
              <Page title="Vella Vault">
                {vault.length === 0 ? (
                  <Empty text="Saved packages will appear here." />
                ) : (
                  vault.map(item => (
                    <Card key={item.id} emoji={item.image} title={item.title} text={`${item.type} package saved`} />
                  ))
                )}
              </Page>
            )}

            {page === "List" && (
              <Page title="Shopping List">
                {shoppingList.length === 0 ? (
                  <Empty text="Add items from outfits, recipes, workouts, or cleaning posts." />
                ) : (
                  shoppingList.map((item, index) => (
                    <div key={index} className="flex justify-between bg-white/10 rounded-2xl p-3 mb-2">
                      <div>
                        <p className="font-bold">{item.name}</p>
                        <p className="text-xs text-purple-300">{item.source}</p>
                      </div>
                      <p>${item.price.toFixed(2)}</p>
                    </div>
                  ))
                )}
              </Page>
            )}

            {page === "Inbox" && (
              <Page title="Inbox & Reminders">
                {reminders.length === 0 ? (
                  <Empty text="Reminders and shared plans will appear here." />
                ) : (
                  reminders.map((item, index) => (
                    <Card key={index} emoji="🔔" title={item.title} text={item.text} />
                  ))
                )}
              </Page>
            )}

            {page === "Store" && (
              <Page title="Vella Store">
                <Card emoji="🛍️" title="Creator Storefronts" text="Every post can become a shopable package." />
                <Card emoji="💰" title="Full Package Pricing" text="Users can buy one item or the entire look, meal, kit, or routine." />
                <Card emoji="📦" title="Save for Payday" text="Users can save and come back when they are ready to buy." />
              </Page>
            )}

            <nav className="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-md bg-black/90 backdrop-blur-xl border-t border-purple-800/50 grid grid-cols-5 p-2">
              {[
                ["Feed", "🏠"],
                ["Vault", "💜"],
                ["List", "🛒"],
                ["Inbox", "💬"],
                ["Store", "🛍️"]
              ].map(([name, icon]) => (
                <button
                  key={name}
                  onClick={() => setPage(name)}
                  className={`py-2 rounded-2xl text-xs ${
                    page === name ? "bg-fuchsia-600 text-white" : "text-purple-300"
                  }`}
                >
                  <div className="text-xl">{icon}</div>
                  {name}
                </button>
              ))}
            </nav>
          </div>
        </div>
      );
    }

    function Page({ title, children }) {
      return (
        <main className="p-4">
          <h2 className="text-2xl font-black mb-4 text-purple-100">{title}</h2>
          {children}
        </main>
      );
    }

    function Card({ emoji, title, text }) {
      return (
        <div className="bg-white/10 border border-purple-500/30 rounded-3xl p-4 mb-3">
          <div className="text-4xl mb-2">{emoji}</div>
          <h3 className="font-bold text-lg">{title}</h3>
          <p className="text-sm text-purple-200">{text}</p>
        </div>
      );
    }

    function Empty({ text }) {
      return (
        <div className="text-center text-purple-300 bg-white/10 rounded-3xl p-8 mt-10">
          {text}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
