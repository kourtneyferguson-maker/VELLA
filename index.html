function safeLoad(key, fallback) {
  try {
    const item = localStorage.getItem(key);
    return item ? JSON.parse(item) : fallback;
  } catch {
    return fallback;
  }
}

function safeSave(key, value) {
  try {
    localStorage.setItem(key, JSON.stringify(value));
  } catch {}
}

function App() {
  const [accepted, setAccepted] = useState(() => localStorage.getItem(STORAGE_KEYS.accepted) === "yes");
  const [page, setPage] = useState("Home");
  const [world, setWorld] = useState("Fashion");
  const [worldTab, setWorldTab] = useState("For You");
  const [templatePhoto, setTemplatePhoto] = useState(() => safeLoad(STORAGE_KEYS.template, null));
  const [vault, setVault] = useState(() => safeLoad(STORAGE_KEYS.vault, []));
  const [cart, setCart] = useState(() => safeLoad(STORAGE_KEYS.cart, []));
  const [reminders, setReminders] = useState(() => safeLoad(STORAGE_KEYS.reminders, []));
  const [message, setMessage] = useState("");
  const [selectedProduct, setSelectedProduct] = useState(null);
  const [tryOnResult, setTryOnResult] = useState(null);
  const [tryOnLoading, setTryOnLoading] = useState(false);

  useEffect(() => safeSave(STORAGE_KEYS.template, templatePhoto), [templatePhoto]);
  useEffect(() => safeSave(STORAGE_KEYS.vault, vault), [vault]);
  useEffect(() => safeSave(STORAGE_KEYS.cart, cart), [cart]);
  useEffect(() => safeSave(STORAGE_KEYS.reminders, reminders), [reminders]);

  const selectedWorld = worlds.find(w => w.name === world) || worlds[0];

  const visiblePosts = useMemo(() => {
    return posts.filter(post => {
      if (post.world !== world) return false;
      if (worldTab === "For You") return true;
      return post.tab === worldTab || post.products.some(p => p.category === worldTab);
    });
  }, [world, worldTab]);

  const cartTotal = cart.reduce((sum, item) => sum + Number(item.price || 0), 0);

  function showMessage(text) {
    setMessage(text);
    window.setTimeout(() => setMessage(""), 4500);
  }

  function acceptTerms() {
    localStorage.setItem(STORAGE_KEYS.accepted, "yes");
    setAccepted(true);
    showMessage("Welcome to Vella. Your saves are private unless you choose to share.");
  }

  function compressImage(file, maxWidth = 1000, quality = 0.78) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();

      reader.onload = () => {
        const image = new Image();

        image.onload = () => {
          const scale = Math.min(1, maxWidth / image.width);
          const canvas = document.createElement("canvas");
          canvas.width = Math.round(image.width * scale);
          canvas.height = Math.round(image.height * scale);

          const ctx = canvas.getContext("2d");
          ctx.drawImage(image, 0, 0, canvas.width, canvas.height);

          resolve(canvas.toDataURL("image/jpeg", quality));
        };

        image.onerror = reject;
        image.src = reader.result;
      };

      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  async function handleTemplateUpload(event) {
    const file = event.target.files?.[0];
    if (!file) return;

    try {
      const compressed = await compressImage(file);
      setTemplatePhoto(compressed);
      setTryOnResult(null);
      showMessage("Try-On Template saved. You can reuse it on every clothing item.");
    } catch {
      showMessage("Could not save photo. Try another image.");
    }
  }

  function removeTemplate() {
    setTemplatePhoto(null);
    setTryOnResult(null);
    showMessage("Try-On Template removed. Add a new one anytime.");
  }

  function saveToVault(item, type = "post") {
    const save = {
      id: `${type}-${item.id || Date.now()}-${Date.now()}`,
      type,
      title: item.title || item.name,
      subtitle: item.store || item.category || "Saved item",
      image: item.cover || item.photo || null,
      createdAt: new Date().toLocaleString()
    };

    setVault([save, ...vault]);
    showMessage("Saved privately to your Vella Vault.");
  }

  function addToCart(product) {
    setCart([{ ...product, cartId: Date.now() }, ...cart]);
    showMessage(`${product.name} added to Vella Cart.`);
  }

  function addReminder(title) {
    const reminder = {
      id: Date.now(),
      title,
      date: "Tonight",
      note: "Vella reminder saved."
    };

    setReminders([reminder, ...reminders]);
    showMessage("Reminder saved.");
  }

  async function runTryOn(product) {
    setSelectedProduct(product);
    setTryOnResult(null);

    if (!templatePhoto) {
      setPage("Template");
      showMessage("Create your Try-On Template once, then use it across Vella.");
      return;
    }

    setPage("TryOn");
    setTryOnLoading(true);

    try {
      const response = await fetch("/api/tryon", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          humanImage: templatePhoto,
          garmentImage: product.photo
        })
      });

      const data = await response.json();

      if (!response.ok) {
        throw new Error(data.details || data.error || "Try-on failed");
      }

      setTryOnResult(data.image);
      showMessage("AI Try-On complete.");
    } catch (error) {
      showMessage(error.message || "AI Try-On could not finish. Check your API key.");
    } finally {
      setTryOnLoading(false);
    }
  }

  if (!accepted) {
    return (
      <Shell>
        <main className="p-4 min-h-screen flex items-center">
          <section className="w-full bg-white/10 border border-fuchsia-500/40 rounded-[2rem] p-5 shadow-2xl">

            <h1 className="text-3xl font-black text-center text-purple-100 drop-shadow-[0_0_16px_#d946ef]">

            </h1>
            <p className="text-center text-purple-300 text-sm mt-2">
              Save inspiration, shop creator stores, plan with friends and use AI Try-On with your private template.
            </p>

            <div className="bg-black/40 rounded-3xl p-4 mt-5 max-h-56 overflow-y-auto text-sm text-purple-200">

              <p>

              </p>
              <p className="mt-3">
                Try-On images are private by default. You choose what to save or share.
              </p>
            </div>

            <button
              onClick={acceptTerms}
              className="w-full bg-fuchsia-600 rounded-3xl p-4 font-black mt-5 active:scale-95 transition"
            >
              Accept & Enter Vella
            </button>
          </section>
        </main>
      </Shell>
    );
  }

      {message && (
        <div className="mx-3 mt-3 bg-purple-900/80 border border-fuchsia-500/40 rounded-2xl p-3 text-sm text-purple-100">
          {message}
        </div>
      )}

      {page === "Home" && (
        <main className="p-4">
          <div className="bg-white/10 border border-purple-500/30 rounded-[2rem] p-5">
            <p className="text-xs text-fuchsia-300 font-bold">TODAY ON VELLA</p>
            <h2 className="text-2xl font-black mt-1">Choose your world</h2>
            <p className="text-sm text-purple-300 mt-1">
              Open a category feed, save what you love, shop the products and plan it later.
            </p>
          </div>

          <div className="grid grid-cols-2 gap-3 mt-4">
            {worlds.map(w => (
              <button
                key={w.name}
                onClick={() => {
                  setWorld(w.name);
                  setWorldTab("For You");
                  setPage("World");
                }}
                className="rounded-[1.7rem] bg-white/10 border border-purple-500/30 p-5 text-left active:scale-95 transition"
              >
                <div className="text-4xl mb-2">{w.emoji}</div>
                <h3 className="font-black">{w.name}</h3>
                <p className="text-xs text-purple-300 mt-1">Open feed</p>
              </button>
            ))}
          </div>

          <button
            onClick={() => setPage("Template")}
            className="w-full bg-fuchsia-600 rounded-3xl p-4 font-black mt-4 active:scale-95 transition"
          >
            {templatePhoto ? "View My Try-On Template" : "Create My Try-On Template"}
          </button>
        </main>
      )}

      {page === "World" && (
        <>
          <section className="sticky top-[84px] z-20 bg-black/90 backdrop-blur-xl border-b border-purple-900/40">
            <div className="flex gap-2 overflow-x-auto hide-scrollbar p-3">
              {worlds.map(w => (
                <button
                  key={w.name}
                  onClick={() => {
                    setWorld(w.name);
                    setWorldTab("For You");
                  }}
                  className={`px-4 py-2 rounded-full text-sm whitespace-nowrap ${
                    world === w.name ? "bg-fuchsia-600" : "bg-white/10 text-purple-200"
                  }`}
                >
                  {w.emoji} {w.name}
                </button>
              ))}
            </div>

            <div className="flex gap-2 overflow-x-auto hide-scrollbar px-3 pb-3">
              {selectedWorld.tabs.map(tab => (
                <button
                  key={tab}
                  onClick={() => setWorldTab(tab)}
                  className={`px-4 py-2 rounded-full text-xs whitespace-nowrap ${
                    worldTab === tab ? "bg-purple-700" : "bg-white/10 text-purple-300"
                  }`}
                >
                  {tab}
                </button>
              ))}
            </div>
          </section>

          <main className="p-4 space-y-5">
            <h2 className="text-2xl font-black">
              {selectedWorld.emoji} {world} · {worldTab}
            </h2>

            {visiblePosts.length === 0 && (
              <Empty text="No posts in this section yet. Seller uploads will appear here." />
            )}

            {visiblePosts.map(post => (
              <PostCard
                key={post.id}
                post={post}
                onTryOn={runTryOn}
                onCart={addToCart}
                onVault={saveToVault}
                onReminder={addReminder}
                onMessage={showMessage}

            ))}
          </main>
        </>
      )}

      {page === "Template" && (
        <main className="p-4">
          <h2 className="text-2xl font-black">My Try-On Template</h2>
          <p className="text-sm text-purple-300 mt-1">
            Add one private body photo. Vella reuses it every time you try on clothing.
          </p>

          <section className="bg-white/10 border border-purple-500/30 rounded-[2rem] p-4 mt-4">
            {templatePhoto ? (
              <>

                    Update
                    <input

                  </label>

                  <button

                  Take or Upload Template Photo
                  <input

                    accept="image/*"
                    capture="user"
                    onChange={handleTemplateUpload}
                    className="hidden"
                  />
                </label>
              </>
            )}
          </section>

          <p className="text-xs text-purple-400 mt-4">
            Demo note: this saves locally in this browser. Real launch needs secure account storage, delete controls and full privacy consent.
          </p>
        </main>
      )}

      {page === "TryOn" && selectedProduct && (
        <main className="p-4">
          <h2 className="text-2xl font-black">AI Try-On</h2>
          <p className="text-sm text-purple-300 mb-4">
            Using your saved template with {selectedProduct.name}.
          </p>

          <div className="grid grid-cols-2 gap-2">
            <ImagePanel title="Your template" src={templatePhoto} />
            <ImagePanel title="Item" src={selectedProduct.photo} />
          </div>

          {tryOnLoading && (
            <div className="bg-fuchsia-900/40 border border-fuchsia-500/40 rounded-[2rem] p-6 text-center mt-4">
              <div className="text-5xl mb-2">✨</div>
              <p className="font-black">Generating AI Try-On</p>
              <p className="text-xs text-purple-300 mt-1">This can take a moment.</p>
            </div>
          )}

          {tryOnResult && (
            <section className="bg-white/10 border border-fuchsia-500/40 rounded-[2rem] p-3 mt-4">
              <p className="font-bold mb-2">Your result</p>
              <img src={tryOnResult} className="w-full rounded-[1.5rem]" />

              <button
                onClick={() => saveToVault({ title: "AI Try-On Result", cover: tryOnResult, store: selectedProduct.name }, "tryon")}
                className="w-full bg-purple-700 rounded-2xl p-3 font-bold mt-3"
              >
                Save Result Privately
              </button>
            </section>
          )}

          {!tryOnLoading && !tryOnResult && (
            <button
              onClick={() => runTryOn(selectedProduct)}
              className="w-full bg-fuchsia-600 rounded-2xl p-4 font-black mt-4"
            >
              Try Again
            </button>
          )}

          <button
            onClick={() => addToCart(selectedProduct)}
            className="w-full bg-purple-700 rounded-2xl p-4 font-black mt-3"
          >
            Add Item to Cart
          </button>
        </main>
      )}

      {page === "Vault" && (
        <main className="p-4">
          <h2 className="text-2xl font-black">Private Vault</h2>
          <p className="text-sm text-purple-300 mb-4">
            Your saves stay private unless you choose to share.
          </p>

          {vault.length === 0 ? (
            <Empty text="Nothing saved yet." />
          ) : (
            <div className="space-y-3">
              {vault.map(item => (
                <div key={item.id} className="bg-white/10 border border-purple-500/30 rounded-[1.7rem] p-3 flex gap-3">
                  {item.image && <img src={item.image} className="w-20 h-20 object-cover rounded-2xl" />}
                  <div className="flex-1">
                    <p className="font-black">{item.title}</p>
                    <p className="text-xs text-purple-300">{item.subtitle}</p>
                    <p className="text-[10px] text-purple-500 mt-1">{item.createdAt}</p>
                    <div className="grid grid-cols-2 gap-2 mt-2">
                      <button onClick={() => showMessage("Share flow planned for next build.")} className="bg-white/10 rounded-xl p-2 text-xs font-bold">Share</button>
                      <button onClick={() => setVault(vault.filter(v => v.id !== item.id))} className="bg-red-800 rounded-xl p-2 text-xs font-bold">Remove</button>

                  </div>
                </div>
              ))}

          )}

      )}

      {page === "Cart" && (
        <main className="p-4">
          <h2 className="text-2xl font-black mb-3">Vella Cart</h2>

          {cart.length === 0 ? (
            <Empty text="Your cart is empty." />
          ) : (
            <>
              <div className="space-y-3">
                {cart.map(item => (
                  <div key={item.cartId} className="flex gap-3 bg-white/10 border border-purple-500/30 rounded-[1.7rem] p-3">
                    <img src={item.photo} className="w-20 h-20 object-cover rounded-2xl" />
                    <div className="flex-1">
                      <h3 className="font-black">{item.name}</h3>
                      <p className="text-xs text-purple-300">{item.shipping}</p>
                      <p className="font-bold text-green-300">${Number(item.price).toFixed(2)}</p>
                    </div>
                    <button onClick={() => setCart(cart.filter(c => c.cartId !== item.cartId))} className="text-red-300 text-sm">✕</button>
                  </div>
                ))}
              </div>

              <div className="bg-black/50 border border-fuchsia-500/30 rounded-[1.7rem] p-4 mt-4">
                <div className="flex justify-between font-black text-lg">
                  <span>Total</span>
                  <span>${cartTotal.toFixed(2)}</span>
                </div>

                <button
                  onClick={() => showMessage("Checkout needs Stripe/Vella payment setup before real launch.")}
                  className="w-full bg-fuchsia-600 rounded-2xl p-4 mt-4 font-black"
                >
                  Pay Securely Through Vella
                </button>
              </div>
            </>
          )}
        </main>
      )}

      {page === "Plans" && (
        <main className="p-4">
          <h2 className="text-2xl font-black">Friend Reminders</h2>
          <p className="text-sm text-purple-300 mb-4">Plan recipes, workouts, shopping and events.</p>

          <button
            onClick={() => addReminder("Check saved Vella plans")}
            className="w-full bg-fuchsia-600 rounded-2xl p-4 font-black mb-4"
          >
            Add Test Reminder
          </button>

          {reminders.length === 0 ? (
            <Empty text="No reminders yet." />
          ) : (
            reminders.map(item => (
              <div key={item.id} className="bg-white/10 border border-purple-500/30 rounded-[1.7rem] p-4 mb-3">
                <p className="font-black">{item.title}</p>
                <p className="text-xs text-purple-300">{item.date}</p>
                <p className="text-sm text-purple-200 mt-1">{item.note}</p>
              </div>
            ))
          )}
        </main>
      )}

      {page === "Seller" && (
        <main className="p-4 space-y-3">
          <h2 className="text-2xl font-black">Seller Centre</h2>
          <p className="text-sm text-purple-300">Mock seller dashboard for launch demo.</p>

          <SellerField label="Product photos" value="Front, back, side and detail photos" />
          <SellerField label="Product name" value="Cream Winter Coat" />
          <SellerField label="Price" value="$89.00" />
          <SellerField label="Sizes" value="XS, S, M, L, XL" />
          <SellerField label="Measurements" value="Bust, waist, sleeve, length" />
          <SellerField label="AI Try-On Image" value="Clean clothing image for AI try-on" />
          <SellerField label="Stock" value="14 available" />
          <SellerField label="Shipping" value="$9.95 standard" />

          <button onClick={() => showMessage("Real seller upload needs database storage next.")} className="w-full bg-fuchsia-600 rounded-2xl p-4 font-black">
            Upload Product to Vella Store
          </button>

          <button onClick={() => showMessage("Creator hire request saved as a planned flow.")} className="w-full bg-white/10 rounded-2xl p-4 font-black">
            Hire Content Creator
          </button>
        </main>
      )}

      <Nav page={page} setPage={setPage} />
    </Shell>
  );
}

function Shell({ children }) {
  return (
    <div className="min-h-screen bg-gradient-to-b from-black via-[#190021] to-black flex justify-center">
      <div className="w-full max-w-md min-h-screen border-x border-purple-900/50 pb-24">
        {children}
      </div>
    </div>
  );
}

function Header({ templatePhoto }) {
  return (
    <header className="sticky top-0 z-30 bg-black/90 backdrop-blur-xl p-4 border-b border-purple-800/50">
      <h1 className="text-center text-3xl font-black text-purple-100 drop-shadow-[0_0_15px_#d946ef]">
        Hello Vella
      </h1>
      <p className="text-center text-xs text-purple-300">
        Discovery · Vault · AI Try-On · Creator Stores
      </p>
      <p className={`text-center text-[11px] mt-1 ${templatePhoto ? "text-green-300" : "text-fuchsia-300"}`}>
        {templatePhoto ? "Try-On Template active" : "Create Try-On Template for AI clothing previews"}
      </p>
    </header>
  );
}

function PostCard({ post, onTryOn, onCart, onVault, onReminder, onMessage }) {
  const packageTotal = post.products.reduce((sum, p) => sum + Number(p.price || 0), 0);

  return (
    <section className="rounded-[2rem] bg-white/10 border border-purple-500/30 overflow-hidden shadow-xl">
      <img src={post.cover} className="w-full h-64 object-cover" />

      <div className="p-4">
        <p className="text-xs text-fuchsia-300 font-bold">{post.store}</p>
        <h3 className="text-xl font-black">{post.title}</h3>
        <p className="text-sm text-purple-300">Seller: {post.seller}</p>
        <p className="text-sm text-purple-100 mt-2">{post.description}</p>

        <div className="flex justify-between items-center bg-black/40 rounded-2xl p-3 mt-3">
          <span className="text-sm text-purple-300">Package total</span>
          <span className="font-black text-green-300">${packageTotal.toFixed(2)}</span>
        </div>

        <div className="mt-4 space-y-3">
          {post.products.map(product => (
            <ProductCard
              key={product.id}
              product={product}
              onTryOn={onTryOn}
              onCart={onCart}
              onVault={onVault}
            />
          ))}
        </div>

        <div className="grid grid-cols-2 gap-2 mt-4">
          <button onClick={() => onVault(post, "post")} className="bg-purple-700 rounded-2xl p-3 font-bold">
            Save Private
          </button>

          <button onClick={() => onMessage("Creator hire flow planned for seller launch.")} className="bg-white/10 rounded-2xl p-3 font-bold">
            Hire Creator
          </button>

          <button onClick={() => onReminder(post.title)} className="bg-white/10 rounded-2xl p-3 font-bold">
            Remind Me
          </button>

          <button onClick={() => onMessage("Share flow planned after accounts are added.")} className="bg-white/10 rounded-2xl p-3 font-bold">
            Share
          </button>
        </div>
      </div>
    </section>
  );
}

function ProductCard({ product, onTryOn, onCart, onVault }) {
  return (
    <div className="bg-black/40 rounded-[1.7rem] overflow-hidden border border-white/10">
      <img src={product.photo} className="w-full h-56 object-cover" />

      <div className="p-3">
        <div className="flex justify-between gap-3">
          <div>
            <h4 className="font-black">{product.name}</h4>
            <p className="text-xs text-purple-300">Sizes: {product.sizes.join(", ")}</p>
          </div>
          <p className="font-black text-green-300">${Number(product.price).toFixed(2)}</p>
        </div>

        <p className="text-xs text-purple-200 mt-2">{product.measurements}</p>
        <p className="text-xs text-purple-300 mt-1">Stock: {product.stock}</p>

        <div className="grid grid-cols-2 gap-2 mt-3">
          <button onClick={() => onTryOn(product)} className="bg-fuchsia-600 rounded-2xl p-3 text-sm font-bold">
            Try On
          </button>

          <button onClick={() => onVault(product, "product")} className="bg-white/10 rounded-2xl p-3 text-sm font-bold">
            Save
          </button>

          <button onClick={() => onCart(product)} className="bg-purple-700 rounded-2xl p-3 text-sm font-bold">
            Add Cart
          </button>

          <button className="bg-white/10 rounded-2xl p-3 text-sm font-bold">
            Details
          </button>
        </div>
      </div>
    </div>
  );
}

function ImagePanel({ title, src }) {
  return (
    <div className="bg-white/10 rounded-[1.5rem] p-2">
      <p className="text-xs text-purple-300 mb-1">{title}</p>
      <img src={src} className="h-52 w-full object-cover rounded-2xl" />
    </div>
  );
}

function Empty({ text }) {
  return (
    <div className="bg-white/10 rounded-[2rem] p-8 text-center text-purple-300">
      {text}
    </div>
  );
}

function SellerField({ label, value }) {
  return (
    <div className="bg-white/10 rounded-2xl p-3 border border-purple-500/30">
      <p className="text-xs text-purple-300">{label}</p>
      <p className="font-bold">{value}</p>
    </div>
  );
}

function Nav({ page, setPage }) {
  const items = [
    ["Home", "🏠"],
    ["World", "🌍"],
    ["Vault", "🔒"],
    ["Plans", "🔔"],
    ["Cart", "🛒"],
    ["Seller", "➕"]
  ];

  return (
    <nav className="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-md bg-black/90 backdrop-blur-xl border-t border-purple-900/60 grid grid-cols-6 p-2">
      {items.map(([name, icon]) => (
        <button
          key={name}
          onClick={() => setPage(name)}
          className={`rounded-2xl py-2 text-[10px] ${
            page === name ? "bg-fuchsia-600 text-white" : "text-purple-300"
          }`}
        >
          <div className="text-lg">{icon}</div>
          {name}
        </button>
      ))}
    </nav>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
