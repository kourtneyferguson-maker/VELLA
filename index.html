<!DOCTYPE html>
<html>
<head>
  <title>Vella</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #050505;
      color: white;
      overflow: hidden;
    }

    .screen {
      display: none;
      height: 100vh;
      width: 100vw;
      padding: 20px;
      background:
        radial-gradient(circle at top, rgba(255,0,150,0.2), transparent 35%),
        radial-gradient(circle at bottom, rgba(0,255,200,0.15), transparent 35%),
        #050505;
    }

    .active { display: flex; flex-direction: column; }

    /* WELCOME */
    .center {
      justify-content: space-between;
      align-items: center;
      text-align: center;
    }

    .logo {
      font-size: 48px;
      font-weight: 900;
      background: linear-gradient(90deg,#ff2bd6,#00ffd0);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .big {
      font-size: 60px;
      font-weight: 900;
      background: linear-gradient(90deg,#ff2bd6,#00ffd0);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .btn {
      width: 100%;
      max-width: 420px;
      padding: 16px;
      border-radius: 999px;
      border: none;
      font-weight: 900;
      cursor: pointer;
      background: linear-gradient(90deg,#ff2bd6,#00ffd0);
      color: black;
      margin-top: 12px;
    }

    .ghost {
      background: transparent;
      border: 1px solid #444;
      color: white;
    }

    input {
      width: 100%;
      padding: 14px;
      margin-top: 10px;
      border-radius: 14px;
      border: 1px solid #333;
      background: #111;
      color: white;
    }

    /* HOME */
    .home { overflow-y: auto; padding-bottom: 90px; }

    .topbar {
      display: flex;
      justify-content: space-between;
      margin-bottom: 15px;
    }

    .search {
      flex: 1;
      margin: 0 10px;
      padding: 10px;
      border-radius: 20px;
      background: #111;
      border: 1px solid #333;
      color: white;
    }

    .stories {
      display: flex;
      gap: 12px;
      overflow-x: auto;
      margin-bottom: 20px;
    }

    .story {
      text-align: center;
      font-size: 11px;
    }

    .circle {
      width: 65px;
      height: 65px;
      border-radius: 50%;
      border: 2px solid #ff2bd6;
      background: url('https://picsum.photos/100') center/cover;
      margin-bottom: 5px;
    }

    .top-sellers {
      padding: 15px;
      border-radius: 20px;
      background: linear-gradient(135deg,#ff2bd6,#00ffd0);
      margin-bottom: 20px;
    }

    .feed-card {
      border-radius: 20px;
      overflow: hidden;
      margin-bottom: 20px;
      background: #111;
    }

    .feed-img {
      height: 250px;
      background: url('https://picsum.photos/400') center/cover;
    }

    .feed-content {
      padding: 12px;
    }

    .bottom-nav {
      position: fixed;
      bottom: 0;
      width: 100%;
      display: flex;
      justify-content: space-around;
      background: #000;
      padding: 10px 0;
    }

    .nav {
      text-align: center;
      font-size: 12px;
    }

    .plus {
      font-size: 28px;
      background: linear-gradient(90deg,#ff2bd6,#00ffd0);
      padding: 5px 12px;
      border-radius: 10px;
      color: black;
    }
  </style>
</head>

<body>

<!-- WELCOME -->
<div id="welcome" class="screen active center">
  <div></div>

  <div>
    <div class="big">Hello Vella!</div>
    <p>The ultimate platform for creators, designers & businesses.</p>
  </div>

  <button class="btn" onclick="go('login')">Create Account</button>
  <button class="btn ghost" onclick="go('login')">Log In</button>
</div>

<!-- LOGIN -->
<div id="login" class="screen center">
  <div></div>

  <div style="width:100%; max-width:400px;">
    <div class="logo">Vella</div>
    <input placeholder="Email">
    <input placeholder="Password">
    <button class="btn" onclick="go('home')">Enter</button>
  </div>

  <div></div>
</div>

<!-- HOME -->
<div id="home" class="screen home">

  <div class="topbar">
    <div class="logo">Vella</div>
    <input class="search" placeholder="Search creators...">
  </div>

  <div class="stories">
    <div class="story"><div class="circle"></div>Live</div>
    <div class="story"><div class="circle"></div>Luxe</div>
    <div class="story"><div class="circle"></div>Art</div>
    <div class="story"><div class="circle"></div>Style</div>
  </div>

  <div class="top-sellers">
    <b>Top Sellers This Week</b>
  </div>

  <div class="feed-card">
    <div class="feed-img"></div>
    <div class="feed-content">
      <b>Luxe Collection</b>
      <p>Live now • Buy trending items</p>
      <button class="btn">Buy Now</button>
    </div>
  </div>

  <div class="feed-card">
    <div class="feed-img"></div>
    <div class="feed-content">
      <b>Art By Tay</b>
      <p>New drops available</p>
      <button class="btn">View</button>
    </div>
  </div>

  <div class="bottom-nav">
    <div class="nav">Home</div>
    <div class="nav">Discover</div>
    <div class="plus">+</div>
    <div class="nav">Rank</div>
    <div class="nav">Profile</div>
  </div>

</div>

<script>
function go(id){
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
</script>

</body>
</html>
