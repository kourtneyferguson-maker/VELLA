<!DOCTYPE html>
<html>
<head>
  <title>Vella</title>
</head>

<body style="margin:0; font-family:Arial; background:#090b10; color:#e8e8f0; padding-bottom:90px;">

  <div style="padding:20px; display:flex; justify-content:space-between; align-items:center;">
    <h2 style="margin:0;">Vella</h2>
    <button style="background:#141823; color:#e8e8f0; border:1px solid #252b3a; padding:10px 16px; border-radius:20px;">
      Go Live
    </button>
  </div>

  <div style="padding:18px; display:grid; grid-template-columns:1fr 1fr; gap:14px;">

    <div style="grid-row:span 2; background:#121622; border-radius:28px; padding:22px; box-shadow:0 0 24px rgba(125,90,255,0.16);">
      <p style="color:#9fa5b5; margin:0;">Featured</p>
      <h1 style="font-size:28px; margin:12px 0;">Watch. Save. Shop.</h1>
      <p style="color:#b8bdd0; line-height:1.5;">Your content, folders, lives and shopping in one calm space.</p>
      <button style="margin-top:18px; background:#1b2030; color:white; border:1px solid #2c344a; padding:12px 16px; border-radius:18px;">
        Explore
      </button>
    </div>

    <div style="background:#121622; border-radius:24px; padding:18px; box-shadow:0 0 18px rgba(255,90,200,0.12);">
      <h3>📁 Save</h3>
      <p style="color:#9fa5b5;">Create folders</p>
    </div>

    <div style="background:#121622; border-radius:24px; padding:18px; box-shadow:0 0 18px rgba(100,200,255,0.12);">
      <h3>🔴 Live</h3>
      <p style="color:#9fa5b5;">Shop streams</p>
    </div>

  </div>

  <div style="padding:0 18px; display:grid; grid-template-columns:1fr 1fr; gap:14px;">

    <div style="background:#121622; border-radius:24px; padding:18px; box-shadow:0 0 18px rgba(120,255,200,0.12);">
      <h3>🛍 Shop</h3>
      <p style="color:#9fa5b5;">Buy from content</p>
    </div>

    <div style="background:#121622; border-radius:24px; padding:18px; box-shadow:0 0 18px rgba(160,120,255,0.12);">
      <h3>🤝 Brands</h3>
      <p style="color:#9fa5b5;">Paid campaigns</p>
    </div>

  </div>

  <div style="position:fixed; bottom:0; width:100%; background:#0f121a; border-top:1px solid #1c1f2a; display:flex; justify-content:space-around; padding:14px 0; font-size:13px; color:#9fa5b5;">
    <span>Home</span>
    <span>Live</span>
    <span>Saved</span>
    <span>Shop</span>
    <span>Profile</span>
  </div>

</body>
</html>
