<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initil-sacale=1.0" />
  <title>Hello Vella AI Try-On</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>

<body class="bg-black text-white">
<div id="root"></div>

<script type="text/babel">
const { useState } = React;

const products = [
  {
    id: 1,
    name: "Cream Winter Coat",
    price: 89,
    photo: "https://storage.googleapis.com/falserverless/model_tests/leffa/tshirt_image.jpg",
    sizes: "XS, S, M, L, XL",
    measurements: "Bust 96cm · Length 82cm · Sleeve 60cm"
  }
];

function App() {
  const [userPhoto, setUserPhoto] = useState(null);
  const [tryOnResult, setTryOnResult] = useState(null);
  const [loading, setLoading] = useState(false);
  const [cart, setCart] = useState([]);

  const product = products[0];

  function fileToBase64(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result);
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  async function handleUpload(e) {
    const file = e.target.files[0];
    if (!file) return;
    const base64 = await fileToBase64(file);
    setUserPhoto(base64);
    setTryOnResult(null);
  }

  async function runTryOn() {
    if (!userPhoto) {
      alert("Upload your photo first.");
      return;
    }

    setLoading(true);
    setTryOnResult(null);

    try {
      const response = await fetch("/api/tryon", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          humanImage: userPhoto,
          garmentImage: product.photo
        })
      });

      const data = await response.json();

      if (!response.ok) {
        throw new Error(data.details || data.error || "Try-on failed");
      }

      setTryOnResult(data.image);
    } catch (err) {
      alert("AI try-on failed: " + err.message);
    } finally {
      setLoading(false);
    }
  }

  return (
    <div className="min-h-screen bg-gradient-to-b from-black via-[#180022] to-black flex justify-center">
      <div className="w-full max-w-md min-h-screen border-x border-purple-900/50 pb-24">

        <header className="sticky top-0 bg-black/90 backdrop-blur-xl p-4 border-b border-purple-800/50 z-20">
          <h1 className="text-center text-3xl font-black text-purple-100 drop-shadow-[0_0_15px_#d946ef]">
            Hello Vella
          </h1>
          <p className="text-center text-xs text-purple-300">
            Real AI Try-On + Vella Checkout
          </p>
        </header>

        <main className="p-4 space-y-4">

          <section className="bg-white/10 rounded-3xl overflow-hidden border border-purple-500/30">
            <img src={product.photo} className="w-full h-72 object-cover" />

            <div className="p-4">
              <h2 className="text-2xl font-black">{product.name}</h2>
              <p className="text-green-300 font-black">${product.price}</p>
              <p className="text-sm text-purple-300 mt-1">Sizes: {product.sizes}</p>
              <p className="text-sm text-purple-300">{product.measurements}</p>
            </div>
          </section>

          <section className="bg-white/10 rounded-3xl p-4 border border-purple-500/30">
            <p className="font-bold mb-2">1. Upload your photo</p>

            <label className="block bg-fuchsia-600 rounded-2xl p-4 text-center font-black cursor-pointer">
              Choose Photo
              <input type="file" accept="image/*" onChange={handleUpload} className="hidden" />
            </label>

            {userPhoto && (
              <img src={userPhoto} className="w-full h-72 object-cover rounded-3xl mt-4" />
            )}
          </section>

          <section className="bg-white/10 rounded-3xl p-4 border border-fuchsia-500/30">
            <p className="font-bold mb-2">2. Generate AI Try-On</p>

            <button
              onClick={runTryOn}
              disabled={loading}
              className="w-full bg-purple-700 rounded-2xl p-4 font-black disabled:opacity-50"
            >
              {loading ? "Generating AI Try-On..." : "Try This On With AI"}
            </button>

            {tryOnResult && (
              <div className="mt-4">
                <p className="font-bold mb-2">Your AI Try-On Result</p>
                <img src={tryOnResult} className="w-full rounded-3xl border border-fuchsia-500/40" />

                <button
                  onClick={() => setCart([...cart, product])}
                  className="w-full bg-fuchsia-600 rounded-2xl p-4 font-black mt-4"
                >
                  Add to Vella Cart
                </button>
              </div>
            )}

            <p className="text-xs text-purple-300 mt-3">
              AI preview only. Always check sizing before buying.
            </p>
          </section>

          <section className="bg-black/50 rounded-3xl p-4 border border-purple-500/30">
            <h2 className="text-xl font-black mb-2">Vella Cart</h2>

            {cart.length === 0 ? (
              <p className="text-purple-300 text-sm">Cart is empty.</p>
            ) : (
              <>
                {cart.map((item, index) => (
                  <div key={index} className="flex justify-between py-2 border-b border-white/10">
                    <span>{item.name}</span>
                    <span>${item.price}</span>
                  </div>
                ))}

                <button className="w-full bg-fuchsia-600 rounded-2xl p-4 font-black mt-4">
                  Pay Securely Through Vella
                </button>
              </>
            )}
          </section>

        </main>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
