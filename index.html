<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vella</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #050505;
  color: white;
}

header {
  text-align: center;
  padding: 15px;
  background: #0d0d0d;
  border-bottom: 1px solid #00ffd0;
}

.logo {
  font-size: 24px;
  font-weight: bold;
  text-shadow: 0 0 10px #00ffd0;
}

.section {
  display: none;
  padding: 20px;
}

.active {
  display: block;
}

.hero {
  background: #111;
  padding: 20px;
  border-radius: 15px;
}

button {
  background: #00ffd0;
  border: none;
  padding: 10px;
  border-radius: 10px;
  margin-top: 10px;
  cursor: pointer;
}

.card {
  background: #111;
  padding: 15px;
  border-radius: 15px;
  margin-top: 10px;
}

.nav {
  position: fixed;
  bottom: 0;
  width: 100%;
  display: flex;
  justify-content: space-around;
  background: #111;
  padding: 10px;
}
</style>
</head>

<body>

<header>
  <div class="logo">VELLA</div>
</header>

<!-- HOME -->
<div id="home" class="section active">
  <div class="hero">
    <h2>Your content world in one place</h2>
    <p>Watch, save, plan and sell all in one app.</p>
    <button onclick="showSection('videos')">Start</button>
  </div>

  <div class="card" onclick="showSection('videos')">🎬 Videos</div>
  <div class="card" onclick="showSection('sell')">🛍 Sell</div>
  <div class="card" onclick="showSection('planner')">📅 Planner</div>
  <div class="card" onclick="showSection('profile')">✨ Profile</div>
</div>

<!-- VIDEOS -->
<div id="videos" class="section">
  <h2>🎬 Videos</h2>
  <p>Video feed coming soon</p>
</div>

<!-- SELL -->
<div id="sell" class="section">
  <h2>🛍 Sell</h2>
  <p>Launch products and campaigns</p>
</div>

<!-- PLANNER -->
<div id="planner" class="section">
  <h2>📅 Planner</h2>
  <p>Save content and set reminders</p>
</div>

<!-- PROFILE -->
<div id="profile" class="section">
  <h2>✨ Profile</h2>
  <p>Your creator page</p>
</div>

<!-- NAV -->
<div class="nav">
  <button onclick="showSection('home')">Home</button>
  <button onclick="showSection('videos')">Videos</button>
  <button onclick="showSection('sell')">Sell</button>
  <button onclick="showSection('planner')">Planner</button>
  <button onclick="showSection('profile')">Profile</button>
</div>

<script>
function showSection(id) {
  document.querySelectorAll('.section').forEach(sec => {
    sec.classList.remove('active');
  });

  document.getElementById(id).classList.add('active');
}
</script>

</body>
</html>
