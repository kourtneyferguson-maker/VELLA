<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vella</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0a0a0a;
  color:white;
}

.app{
  max-width:430px;
  margin:auto;
  padding:20px;
}

h1{
  font-size:34px;
  background:linear-gradient(90deg,#ff2bd6,#2befff);
  -webkit-background-clip:text;
  color:transparent;
}

.hero{
  height:500px;
  border-radius:25px;
  padding:20px;
  background:
    linear-gradient(#0003,#0008),
    url("https://images.unsplash.com/photo-1490481651871-ab68de25d43d");
  background-size:cover;
  position:relative;
}

.product{
  position:absolute;
  bottom:20px;
  left:20px;
  right:20px;
  background:#111;
  padding:15px;
  border-radius:20px;
}

.btn{
  width:100%;
  margin-top:10px;
  padding:14px;
  border:none;
  border-radius:15px;
  font-weight:bold;
  background:linear-gradient(90deg,#ff2bd6,#2befff);
  color:black;
}

.modal{
  display:none;
  position:fixed;
  inset:0;
  background:#000c;
  justify-content:center;
  align-items:center;
}

.box{
  background:#111;
  padding:20px;
  border-radius:20px;
  width:90%;
}

.preview{
  height:200px;
  border-radius:15px;
  margin:10px 0;
  background:#222;
  display:flex;
  align-items:center;
  justify-content:center;
}
</style>
</head>

<body>

<div class="app">

<h1>Vella</h1>

<div class="hero">

<div class="product">
<h2>Influencer Outfit</h2>
<p>$79.99</p>

<button class="btn" onclick="openTryOn()">Try On ✨</button>
<button class="btn" onclick="buy()">Buy</button>

</div>
</div>

</div>

<div id="tryOn" class="modal">
<div class="box">

<h2>Try On ✨</h2>

<div class="preview">👗 Preview</div>

<button class="btn">Select Size</button>
<button class="btn">Change Colour</button>
<button class="btn" onclick="buy()">Buy Now</button>
<button class="btn" onclick="closeTryOn()">Close</button>

</div>
</div>

<script>
function openTryOn(){
  document.getElementById("tryOn").style.display="flex";
}

function closeTryOn(){
  document.getElementById("tryOn").style.display="none";
}

function buy(){
  alert("✨ Demo Purchase Complete");
}
</script>

</body>
</html>
