<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Vella</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0a0a0a;
      color: white;
    }

    .header {
      padding: 15px;
      font-size: 20px;
      font-weight: bold;
      text-align: center;
      background: #111;
      border-bottom: 1px solid #222;
    }

    .feed {
      padding: 10px;
    }

    .card {
      background: #111;
      border-radius: 15px;
      padding: 15px;
      margin-bottom: 15px;
      box-shadow: 0 0 10px rgba(0,255,200,0.1);
    }

    .button {
      background: #00ffc8;
      border: none;
      padding: 10px;
      border-radius: 10px;
      color: black;
      font-weight: bold;
      margin-top: 10px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="header">VELLA</div>

<div class="feed">
  <div class="card">
    <h3>Welcome to Vella</h3>
    <p>Your all-in-one content + business app</p>
    <button class="button">Start</button>
  </div>
</div>

</body>
</html>
