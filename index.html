<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hello Vella AI Try-On</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>

<body class="bg-black text-white">
<div id="root"></div>

<script type="text/babel">
const { useState, useRef } = React;

const worlds = ["Fashion", "Beauty", "Food", "Fitness", "Cleaning", "Tech"];

const sellerPosts = [
  {
    id: 1,
    world: "Fashion",
    store: "Luna Winter Co.",
    seller: "Mila Styles",
    title: "Soft Winter Outfit",
    cover: "https://images.unsplash.com/photo-1485968579580-b6d095142e6e?w=900",
    description: "Full winter outfit package with AI try-on, sizing, stock and Vella checkout.",
    products: [
      {
        id: "coat",
        name: "Cream Winter Coat",
        photo: "https://images.unsplash.com/photo-1544022613-e87ca75a784a?w=900",
        price: 89,
        sizes: ["XS", "S", "M", "L", "XL"],
        measurements: "Bust 96cm · Length 82cm · Sleeve 60cm",
        stock: 14,
        shipping: "$9.95 standard shipping",
        returns: "14-day return"
      },
      {
        id: "scarf",
        name: "Soft Beige Scarf",
        photo: "https://images.unsplash.com/photo-1601924994987-69e26d50dc26?w=900",
        price: 25,
        sizes: ["One size"],
        measurements: "180cm x 35cm",
        stock: 32,
        shipping: "$6.95 standard shipping",
        returns: "14-day return"
      }
    ]
  }
];

function App() {
  const [page, setPage] = useState("Home");
  const [world, setWorld] = useState("Fashion");
  const [tryOnProduct, setTryOnProduct] = useState(null);
  const [userPhoto, setUserPhoto] = useState(null);
  const [tryOnResult, setTryOnResult] = useState(null);
  const [loading, setLoading] = useState(false);
  const [cart, setCart] = useState([]);
  const [vault, setVault] = useState([]);
  const [cameraOpen, setCameraOpen] = useState(false);
  const [cameraFacing, setCameraFacing] = useState("user");
  const [cameraError, setCameraError] = useState("");

  const videoRef = useRef(null);
  const streamRef = useRef(null);

  const worldPosts = sellerPosts.filter(p => p.world === world);

  function fileToBase64(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result);
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  async function uploadUserPhoto(event) {
    const file = event.target.files[0];
    if (!file) return;
    const base64 = await fileToBase64(file);
    setUserPhoto(base64);
    setTryOnResult(null);
  }

  async function openCamera(facing = cameraFacing) {
    setCameraError("");
    setCameraOpen(true);

    try {
      stopCamera();

      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: facing },
        audio: false
      });

      streamRef.current = stream;

      setTimeout(() => {
        if (videoRef.current) {
          videoRef.current.srcObject = stream;
        }
      }, 100);
    } catch (error) {
      setCameraError("Camera could not open. Check browser camera permissions.");
    }
  }

  function stopCamera() {
    if (streamRef.current) {
      streamRef.current.getTracks().forEach(track => track.stop());
      streamRef.current = null;
    }
  }

  function closeCamera() {
    stopCamera();
    setCameraOpen(false);
  }

  async function switchCamera() {
    const nextFacing = cameraFacing === "user" ? "environment" : "user";
    setCameraFacing(nextFacing);
    await openCamera(nextFacing);
  }

  function takePhoto() {
    const video = videoRef.current;
    if (!video) return;

    const canvas = document.createElement("canvas");
    canvas.width = video.videoWidth || 720;
    canvas.height = video.videoHeight || 960;

    const ctx = canvas.getContext("2d");
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

    const photo = canvas.toDataURL("image/png");
    setUserPhoto(photo);
    setTryOnResult(null);
    closeCamera();
  }

  async function runRealTryOn() {
    if (!userPhoto) {
      alert("Upload or take a photo first.");
      return;
    }

    setLoading(true);
    setTryOnResult(null);

    try {
      const response = await fetch("/api/tryon", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          humanImage: userPhoto,
          garmentImage: tryOnProduct.photo
        })
      });

      const data = await response.json();

      if (!response.ok) {
        throw new Error(data.details || data.error || "Try-on failed");
      }

      setTryOnResult(data.image);
    } catch (err) {
      alert("AI try-on failed: " + err.message);
    } finally {
      setLoading(false);
    }
  }

  return (
    <div className="min-h-screen bg-gradient-to-b from-black via-[#180022] to-black flex justify-center">
      <div className="w-full max-w-md min-h-screen border-x border-purple-900/50 pb-24">

        <header className="sticky top-0 z-30 bg-black/90 backdrop-blur-xl p-4 border-b border-purple-800/50">
          <h1 className="text-center text-3xl font-black text-purple-100 drop-shadow-[0_0_15px_#d946ef]">
            Hello Vella
          </h1>
          <p className="text-center text-xs text-purple-300">
            Seller stores. AI try-on. Vella checkout.
          </p>
        </header>

        {page === "Home" && (
          <main className="p-4">
            <h2 className="text-xl font-black mb-3">Choose your world</h2>

            <div className="grid grid-cols-2 gap-3">
              {worlds.map(w => (
                <button
                  key={w}
                  onClick={() => {
                    setWorld(w);
                    setPage("World");
                  }}
                  className="rounded-3xl bg-white/10 border border-purple-500/30 p-5 text-left"
                >
                  <div className="text-4xl mb-2">
                    {w === "Fashion" && "🧥"}
                    {w === "Beauty" && "💄"}
                    {w === "Food" && "🍝"}
                    {w === "Fitness" && "🏋️"}
                    {w === "Cleaning" && "🧽"}
                    {w === "Tech" && "💻"}
                  </div>
                  <h3 className="font-black">{w}</h3>
                  <p className="text-xs text-purple-300">Open {w} feed</p>
                </button>
              ))}
            </div>
          </main>
        )}

        {page === "World" && (
          <>
            <div className="sticky top-[88px] z-20 bg-black/90 backdrop-blur-xl p-3 border-b border-purple-900/40">
              <div className="flex gap-2 overflow-x-auto">
                {worlds.map(w => (
                  <button
                    key={w}
                    onClick={() => setWorld(w)}
                    className={`px-4 py-2 rounded-full text-sm whitespace-nowrap ${
                      world === w ? "bg-fuchsia-600" : "bg-white/10 text-purple-200"
                    }`}
                  >
                    {w}
                  </button>
                ))}
              </div>
            </div>

            <main className="p-4 space-y-5">
              <h2 className="text-2xl font-black">{world} Seller Feed</h2>

              {world !== "Fashion" && (
                <div className="bg-white/10 rounded-3xl p-5 text-purple-200">
                  This world is ready for its own seller feed.
                </div>
              )}

              {worldPosts.map(post => (
                <section key={post.id} className="rounded-3xl bg-white/10 border border-purple-500/30 overflow-hidden">
                  <img src={post.cover} className="w-full h-64 object-cover" />

                  <div className="p-4">
                    <p className="text-xs text-fuchsia-300">{post.store}</p>
                    <h3 className="text-xl font-black">{post.title}</h3>
                    <p className="text-sm text-purple-300">Seller: {post.seller}</p>
                    <p className="text-sm text-purple-100 mt-2">{post.description}</p>

                    <div className="mt-4 space-y-3">
                      {post.products.map(product => (
                        <div key={product.id} className="bg-black/40 rounded-3xl overflow-hidden border border-white/10">
                          <img src={product.photo} className="w-full h-56 object-cover" />

                          <div className="p-3">
                            <div className="flex justify-between gap-3">
                              <div>
                                <h4 className="font-black">{product.name}</h4>
                                <p className="text-xs text-purple-300">
                                  Sizes: {product.sizes.join(", ")}
                                </p>
                              </div>
                              <p className="font-black text-green-300">${product.price.toFixed(2)}</p>
                            </div>

                            <p className="text-xs text-purple-200 mt-2">{product.measurements}</p>
                            <p className="text-xs text-purple-300 mt-1">Stock: {product.stock}</p>

                            <div className="grid grid-cols-2 gap-2 mt-3">
                              <button
                                onClick={() => {
                                  setTryOnProduct(product);
                                  setTryOnResult(null);
                                }}
                                className="bg-fuchsia-600 rounded-2xl p-2 text-sm font-bold"
                              >
                                AI Try-On
                              </button>

                              <button className="bg-white/10 rounded-2xl p-2 text-sm font-bold">
                                Size Guide
                              </button>

                              <button
                                onClick={() => setCart([...cart, product])}
                                className="bg-purple-700 rounded-2xl p-2 text-sm font-bold"
                              >
                                Add to Cart
                              </button>

                              <button className="bg-white/10 rounded-2xl p-2 text-sm font-bold">
                                Details
                              </button>
                            </div>
                          </div>
                        </div>
                      ))}
                    </div>

                    <div className="grid grid-cols-2 gap-2 mt-4">
                      <button
                        onClick={() => setVault([...vault, post])}
                        className="bg-purple-700 rounded-2xl p-3 font-bold"
                      >
                        Save Private
                      </button>

                      <button className="bg-white/10 rounded-2xl p-3 font-bold">
                        Hire Creator
                      </button>
                    </div>
                  </div>
                </section>
              ))}
            </main>
          </>
        )}

        {page === "Vault" && (
          <main className="p-4">
            <h2 className="text-2xl font-black">Private Portfolio</h2>
            <p className="text-sm text-purple-300 mb-4">
              Your saves stay private unless you choose to share.
            </p>

            {vault.length === 0 ? (
              <Empty text="Nothing saved yet." />
            ) : (
              vault.map((item, index) => (
                <div key={index} className="bg-white/10 rounded-3xl p-4 mb-3">
                  <h3 className="font-black">{item.title}</h3>
                  <p className="text-sm text-purple-300">{item.store}</p>
                </div>
              ))
            )}
          </main>
        )}

        {page === "Cart" && (
          <main className="p-4">
            <h2 className="text-2xl font-black mb-3">Vella Checkout</h2>

            {cart.length === 0 ? (
              <Empty text="Your cart is empty." />
            ) : (
              <>
                {cart.map((item, index) => (
                  <div key={index} className="flex gap-3 bg-white/10 rounded-3xl p-3 mb-3">
                    <img src={item.photo} className="w-20 h-20 object-cover rounded-2xl" />
                    <div className="flex-1">
                      <h3 className="font-black">{item.name}</h3>
                      <p className="text-xs text-purple-300">{item.shipping}</p>
                      <p className="font-bold text-green-300">${item.price.toFixed(2)}</p>
                    </div>
                  </div>
                ))}

                <button className="w-full bg-fuchsia-600 rounded-2xl p-4 mt-4 font-black">
                  Pay Securely Through Vella
                </button>
              </>
            )}
          </main>
        )}

        {page === "Seller" && (
          <main className="p-4 space-y-3">
            <h2 className="text-2xl font-black">Seller Upload Centre</h2>
            <SellerField label="Product photos" value="Front, back, side and detail photos" />
            <SellerField label="Product name" value="Cream Winter Coat" />
            <SellerField label="Price" value="$89.00" />
            <SellerField label="Sizes" value="XS, S, M, L, XL" />
            <SellerField label="Measurements" value="Bust, waist, sleeve, length" />
            <SellerField label="AI Try-On image" value="Clean product image for try-on" />
            <SellerField label="Stock" value="14 available" />
            <SellerField label="Shipping" value="$9.95 standard" />

            <button className="w-full bg-fuchsia-600 rounded-2xl p-4 font-black">
              Upload Product to Vella Store
            </button>

            <button className="w-full bg-white/10 rounded-2xl p-4 font-black">
              Hire Content Creator
            </button>
          </main>
        )}

        {tryOnProduct && (
          <div className="fixed inset-0 bg-black/90 z-50 flex items-end justify-center">
            <div className="w-full max-w-md bg-[#17001f] rounded-t-3xl p-4 border-t border-fuchsia-500/40 max-h-[92vh] overflow-y-auto">

              <h2 className="text-2xl font-black">AI Try-On</h2>
              <p className="text-sm text-purple-300 mb-4">
                Try on {tryOnProduct.name} before buying.
              </p>

              <div className="bg-black/40 rounded-3xl p-3 border border-purple-500/30">
                <p className="text-xs text-purple-300 mb-2">1. Add your photo</p>

                <div className="grid grid-cols-2 gap-2">
                  <label className="block bg-fuchsia-600 rounded-2xl p-4 text-center font-black cursor-pointer">
                    Upload Photo
                    <input
                      type="file"
                      accept="image/*"
                      onChange={uploadUserPhoto}
                      className="hidden"
                    />
                  </label>

                  <button
                    onClick={() => openCamera("user")}
                    className="bg-purple-700 rounded-2xl p-4 text-center font-black"
                  >
                    Take Live Photo
                  </button>
                </div>

                {userPhoto ? (
                  <img src={userPhoto} className="w-full h-72 object-cover rounded-3xl mt-3" />
                ) : (
                  <div className="h-72 rounded-3xl bg-white/5 mt-3 flex items-center justify-center text-purple-300">
                    Your photo preview
                  </div>
                )}
              </div>

              <div className="bg-black/40 rounded-3xl p-3 border border-purple-500/30 mt-3">
                <p className="text-xs text-purple-300 mb-2">2. Clothing item</p>
                <img src={tryOnProduct.photo} className="w-full h-56 object-cover rounded-3xl" />
                <h3 className="font-black mt-2">{tryOnProduct.name}</h3>
                <p className="text-sm text-green-300">${tryOnProduct.price.toFixed(2)}</p>
              </div>

              <div className="bg-fuchsia-950/40 rounded-3xl p-4 border border-fuchsia-500/40 mt-3">
                <p className="text-xs text-fuchsia-300 mb-2">3. Generate AI preview</p>

                <button
                  onClick={runRealTryOn}
                  disabled={loading}
                  className="w-full bg-fuchsia-600 rounded-2xl p-4 font-black disabled:opacity-50"
                >
                  {loading ? "Generating AI Try-On..." : "Try This On With AI"}
                </button>

                {tryOnResult && (
                  <div className="mt-4">
                    <p className="font-bold mb-2">Your AI Try-On Result</p>
                    <img src={tryOnResult} className="w-full rounded-3xl border border-fuchsia-500/40" />
                  </div>
                )}

                <p className="text-xs text-purple-300 mt-3">
                  AI preview only. Fit may vary by body shape, fabric, lighting, stretch and sizing.
                </p>
              </div>

              <div className="grid grid-cols-2 gap-2 mt-4">
                <button
                  onClick={() => {
                    closeCamera();
                    setTryOnProduct(null);
                  }}
                  className="bg-white/10 rounded-2xl p-3 font-bold"
                >
                  Close
                </button>

                <button
                  onClick={() => setCart([...cart, tryOnProduct])}
                  className="bg-purple-700 rounded-2xl p-3 font-bold"
                >
                  Add to Cart
                </button>
              </div>
            </div>
          </div>
        )}

        {cameraOpen && (
          <div className="fixed inset-0 bg-black/95 z-[60] flex items-center justify-center p-4">
            <div className="w-full max-w-md bg-[#17001f] rounded-3xl p-4 border border-fuchsia-500/40">
              <h2 className="text-2xl font-black mb-2">Take Live Photo</h2>
              <p className="text-sm text-purple-300 mb-3">
                Use your laptop webcam or phone camera.
              </p>

              {cameraError ? (
                <div className="bg-red-900/40 border border-red-500/40 rounded-3xl p-4 text-sm">
                  {cameraError}
                </div>
              ) : (
                <video
                  ref={videoRef}
                  autoPlay
                  playsInline
                  muted
                  className="w-full h-96 object-cover rounded-3xl bg-black"
                />
              )}

              <div className="grid grid-cols-2 gap-2 mt-4">
                <button onClick={switchCamera} className="bg-white/10 rounded-2xl p-3 font-bold">
                  Switch Camera
                </button>
                <button onClick={takePhoto} className="bg-fuchsia-600 rounded-2xl p-3 font-bold">
                  Capture Photo
                </button>
                <button onClick={closeCamera} className="bg-white/10 rounded-2xl p-3 font-bold col-span-2">
                  Cancel Camera
                </button>
              </div>
            </div>
          </div>
        )}

        <nav className="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-md bg-black/90 backdrop-blur-xl border-t border-purple-900/60 grid grid-cols-5 p-2">
          {[
            ["Home", "🏠"],
            ["World", "🌍"],
            ["Vault", "🔒"],
            ["Cart", "🛒"],
            ["Seller", "➕"]
          ].map(([name, icon]) => (
            <button
              key={name}
              onClick={() => setPage(name)}
              className={`rounded-2xl py-2 text-xs ${
                page === name ? "bg-fuchsia-600 text-white" : "text-purple-300"
              }`}
            >
              <div className="text-xl">{icon}</div>
              {name}
            </button>
          ))}
        </nav>

      </div>
    </div>
  );
}

function Empty({ text }) {
  return (
    <div className="bg-white/10 rounded-3xl p-8 text-center text-purple-300">
      {text}
    </div>
  );
}

function SellerField({ label, value }) {
  return (
    <div className="bg-white/10 rounded-2xl p-3 border border-purple-500/30">
      <p className="text-xs text-purple-300">{label}</p>
      <p className="font-bold">{value}</p>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
